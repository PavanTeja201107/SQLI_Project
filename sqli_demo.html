<!DOCTYPE html>
<html>

<head>
<title>Web Attack Detection Demo</title>

<style>

body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
}

h2 {
    margin-top: 40px;
}

.container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 50px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    width: 420px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 14px;
}

th {
    background: #f2f2f2;
}

.arrow {
    font-size: 40px;
    font-weight: bold;
}

select, button {
    padding: 10px;
    margin-top: 10px;
    font-size: 14px;
}

.success {
    color: green;
    font-weight: bold;
}

.attack {
    color: red;
    font-weight: bold;
}

.info {
    color: #555;
    font-size: 14px;
}

</style>

</head>

<body>

<h2>🚀 Web Attack Detection Demo (SQLi + XSS + DoS)</h2>

<div class="container">

<!-- Query Selection -->
<div class="box">

<h3>Select Scenario</h3>

<select id="query">
<option value="normal">Normal Login</option>
<option value="invalid">Invalid Login</option>
<option value="sqli1">SQL Injection 1</option>
<option value="sqli2">SQL Injection 2</option>
<option value="xss1">XSS Attack 1</option>
<option value="xss2">XSS Attack 2</option>
<option value="dos">DoS Simulation</option>
</select>

<br>

<button onclick="runQuery()">Run</button>

<p id="queryText" class="info"></p>

</div>

<div class="arrow">➡</div>

<!-- Database -->
<div class="box">

<h3>Database (Users)</h3>

<table>
<tr>
<th>ID</th>
<th>Username</th>
<th>Password</th>
</tr>

<tr><td>1</td><td>admin</td><td>admin123</td></tr>
<tr><td>2</td><td>user1</td><td>1234</td></tr>
<tr><td>3</td><td>test</td><td>pass</td></tr>
</table>

</div>

<div class="arrow">➡</div>

<!-- Output -->
<div class="box">

<h3>System Output</h3>

<div id="result"></div>

</div>

</div>

<script>

function runQuery(){

let type = document.getElementById("query").value;
let result = document.getElementById("result");
let queryText = document.getElementById("queryText");

// NORMAL
if(type === "normal"){
queryText.textContent = "SELECT * FROM users WHERE username='admin' AND password='admin123'";
result.innerHTML = "<p class='success'>✅ Login Successful</p>";
}

// INVALID
else if(type === "invalid"){
queryText.textContent = "SELECT * FROM users WHERE username='admin' AND password='wrong'";
result.innerHTML = "<p class='info'>No matching records</p>";
}

// SQLi
else if(type === "sqli1"){
queryText.textContent = "SELECT * FROM users WHERE username='' OR '1'='1'";
result.innerHTML = "<p class='attack'>🚨 SQL Injection Detected</p>";
}

else if(type === "sqli2"){
queryText.textContent = "SELECT * FROM users WHERE username='admin'--";
result.innerHTML = "<p class='attack'>🚨 SQL Injection Detected</p>";
}

// XSS (safe display)
else if(type === "xss1"){
queryText.textContent = "&lt;script&gt;alert(1)&lt;/script&gt;";
result.innerHTML = "<p class='attack'>🚨 XSS Attack Detected</p>";
}

else if(type === "xss2"){
queryText.textContent = "&lt;img src=x onerror=alert(1)&gt;";
result.innerHTML = "<p class='attack'>🚨 XSS Attack Detected</p>";
}

// DoS
else if(type === "dos"){
queryText.textContent = "Multiple rapid requests from same IP";
result.innerHTML = "<p class='attack'>🚨 DoS Attack Detected</p>";
}

}

</script>

</body>
</html>
